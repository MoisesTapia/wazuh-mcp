name: DevSecOps

# Security scanning pipeline. All reports are printed to the job console.
# SARIF upload is intentionally not used yet.
#
# Scanners are report-only for now (continue-on-error: true) so findings are
# surfaced without blocking merges. To turn any scanner into a hard gate,
# remove its `continue-on-error: true`.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Dependency (library) vulnerability scan — pip-audit ──────────────────────
  dependency-scan:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: |
          echo "::group::pip-audit report"
          pip-audit --progress-spinner=off --desc
          echo "::endgroup::"

  # ── License scan — pip-licenses ──────────────────────────────────────────────
  license-scan:
    name: License scan (pip-licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and pip-licenses
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pip-licenses

      - name: List dependency licenses
        run: |
          echo "::group::Dependency licenses"
          pip-licenses --order=license --format=markdown --with-urls
          echo "::endgroup::"

      - name: Flag copyleft / unknown licenses
        continue-on-error: true
        run: |
          echo "::group::Copyleft / unknown license check"
          if pip-licenses --format=csv \
               | grep -iE 'GPL|AGPL|LGPL|MPL|UNKNOWN'; then
            echo "::warning::Copyleft or unknown licenses detected — review the list above."
          else
            echo "No copyleft or unknown licenses found."
          fi
          echo "::endgroup::"

  # ── Python SAST — Bandit ─────────────────────────────────────────────────────
  sast-bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]"

      - name: Run bandit
        continue-on-error: true
        run: |
          echo "::group::Bandit report"
          bandit -r src/ -ll -f screen
          echo "::endgroup::"

  # ── Dockerfile SAST / lint — hadolint ────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: tty
          no-fail: true   # report-only for now; prints results to console
